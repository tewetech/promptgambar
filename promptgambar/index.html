<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Gambar Tewe Tech</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* Variabel CSS untuk kemudahan kustomisasi */
        :root {
            --primary-color: #FA791E;
            --accent-color: #FA791E;
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.2);
            --card-border: rgba(255, 255, 255, 0.3);
            --shadow-subtle: 0 4px 15px rgba(0, 0, 0, 0.08);
            --shadow-bold: 0 12px 30px rgba(0, 0, 0, 0.15);
            --transition-speed: 0.5s;
        }

        /* Reset dan properti dasar body */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            /* Latar belakang dengan gambar dan efek blur */
            background-image: url('Data/Background.jpeg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        /* Overlay untuk efek blur pada background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(10px); /* Efek blur utama */
            -webkit-backdrop-filter: blur(10px);
            z-index: -1;
        }
        
        /* Header halaman */
        .section-header {
            text-align: center;
            padding: 80px 20px;
            max-width: 900px;
            animation: fadeIn 1.2s ease-in-out;
            transition: color var(--transition-speed);
        }

        .section-header h1 {
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 700;
            color: white; /* Warna judul diubah menjadi putih */
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
            transition: color var(--transition-speed);
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        
        .section-header h1::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -15px;
            width: 70px;
            height: 4px;
            background-color: var(--accent-color);
            transform: translateX(-50%);
            border-radius: 2px;
            animation: expandLine 1.5s ease-out;
            transition: background-color var(--transition-speed);
        }

        .section-header p {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: #ecf0f1; /* Warna deskripsi diubah agar terlihat di background */
            opacity: 0.9;
            margin-top: 30px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            transition: color var(--transition-speed);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }
        
        /* Container galeri */
        .gallery-container {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            padding: 20px;
            max-width: 1200px;
            margin-bottom: 80px;
        }

        /* Kartu utama dengan efek glass */
        .main-card {
            background-color: var(--glass-bg); /* Background transparan */
            border-radius: 15px;
            border: 1px solid var(--card-border); /* Border semi-transparan */
            backdrop-filter: blur(10px); /* Efek glass pada kartu */
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--shadow-subtle);
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            will-change: transform;
            perspective: 1000px;
            max-width: 450px;
            width: 90%;
            padding-bottom: 20px;
            text-align: center;
        }
        
        .main-card:hover {
            transform: translateY(-15px);
            box-shadow: var(--shadow-bold);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            padding: 0 20px;
            flex-wrap: wrap;
        }
        
        .main-card-title {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.8em;
            font-weight: 700;
            color: #ffffff;
            transition: color var(--transition-speed);
        }

        .image-pair-wrapper {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding: 20px;
            gap: 20px;
            flex-wrap: wrap;
            position: relative;
        }

        .image-sub-card {
            flex: 1 1 150px;
            background-color: rgba(255, 255, 255, 0.3); /* Background sub-card */
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            position: relative;
            height: 250px;
            transition: transform 0.3s ease, background-color var(--transition-speed), box-shadow var(--transition-speed);
            cursor: pointer;
        }

        .image-sub-card:hover {
            transform: scale(1.05);
        }

        .image-sub-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .image-sub-card .label,
        .prompt-button {
            position: absolute;
            bottom: 10px;
            background-color: rgba(26, 42, 81, 0.7);
            color: white;
            padding: 5px 12px;
            border: none;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            z-index: 10;
            transition: background-color 0.3s ease;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 35px;
        }

        .image-sub-card .label.before {
            left: 10px;
        }

        .after-and-prompt-buttons {
            position: absolute;
            bottom: 10px; 
            right: 10px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .after-and-prompt-buttons .label.after {
            position: static;
            right: auto;
        }
        
        .image-sub-card:hover .label,
        .prompt-button:hover {
            background-color: var(--accent-color);
        }

        .prompt-button {
            width: 35px;
            height: 35px;
            padding: 0;
            position: static;
        }
        
        .prompt-button i {
            font-size: 1.1em;
        }
        
        /* Modal overlay */
        .modal-overlay,
        .image-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .modal-overlay.active,
        .image-modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Konten modal dengan efek glass */
        .modal-content {
            background-color: var(--glass-bg); /* Background transparan */
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px); /* Efek glass pada modal */
            -webkit-backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            position: relative; 
            transform: scale(0.9);
            transition: transform 0.3s ease, background-color var(--transition-speed);
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-subtle);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.5rem;
            color: var(--text-color);
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: var(--accent-color);
        }

        .modal-title {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.5em;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .modal-body {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
        }

        .modal-text {
            color: var(--text-color);
            opacity: 0.9;
            font-size: 0.9em;
            line-height: 1.6;
            white-space: pre-wrap;
            transition: color var(--transition-speed);
        }

        .copy-button {
            background-color: var(--accent-color);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: background-color 0.3s ease, transform 0.2s ease, color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            align-self: flex-start;
            width: 100%;
            justify-content: center;
        }
        
        .copy-button.copied {
            background-color: #2ecc71;
            color: white;
        }

        .copy-button:hover {
            background-color: var(--accent-color);
            transform: translateY(-2px);
        }
        
        .copy-button i {
            font-size: 1.1em;
        }
        
        /* Konten modal gambar dengan efek glass */
        .image-modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.2);
            transform: scale(0.95);
            transition: transform 0.3s ease;
            background-color: var(--glass-bg); /* Background transparan */
            border: 2px solid var(--card-border);
            backdrop-filter: blur(20px); /* Efek glass pada modal gambar */
            -webkit-backdrop-filter: blur(20px);
            border-radius: 10px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        .image-modal-title {
            color: var(--primary-color);
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 600;
            text-align: center;
        }
        
        .image-modal-image {
            max-width: 100%;
            max-height: 75vh;
            border-radius: 8px;
            object-fit: contain;
        }
        
        .image-modal-overlay.active .image-modal-content {
            transform: scale(1);
        }

        .image-modal-close {
            position: absolute;
            top: -15px;
            right: -15px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.8);
            color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: var(--shadow-subtle);
            transition: transform 0.2s ease, background-color var(--transition-speed), color var(--transition-speed);
        }
        
        .image-modal-close:hover {
            transform: rotate(90deg);
        }
        
        /* Animasi */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes expandLine {
            from { width: 0; }
            to { width: 70px; }
        }
        
        /* Media Queries untuk responsivitas */
        @media (max-width: 992px) {
            .gallery-container {
                flex-direction: column;
                align-items: center;
            }
            .card-header {
                flex-direction: column;
                gap: 5px;
            }
        }
        
        @media (max-width: 768px) {
            .section-header {
                padding: 60px 15px;
            }
            .image-pair-wrapper {
                flex-direction: column;
                align-items: center;
            }
            .image-sub-card {
                width: 90%;
                flex: none;
            }
            .modal-content {
                padding: 20px;
                max-height: 70vh;
            }
            .after-and-prompt-buttons {
                bottom: 10px;
                right: 10px;
            }
        }
        
        @media (max-width: 480px) {
            .main-card {
                padding-bottom: 15px;
            }
            .modal-title {
                font-size: 1.3em;
            }
            .modal-text {
                font-size: 0.85em;
            }
            .copy-button {
                padding: 10px 15px;
                font-size: 0.8em;
            }
            .image-modal-content {
                padding: 15px;
            }
            .image-modal-close {
                top: -10px;
                right: -10px;
                width: 35px;
                height: 35px;
            }
        }
    </style>
</head>
<body>

    <header class="section-header">
        <h1>KUMPULAN PROMPT GAMBAR</h1>
        <p>Tempat nongkrong mencari referensi prompt gambar.</p> 
        <p>Tewe Tech Free Copyright.</p>
    </header>

    <div id="gallery-container" class="gallery-container">
    </div>

    <div id="prompt-modal" class="modal-overlay" onclick="closeModal(event, 'prompt-modal')">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal(null, 'prompt-modal')">&times;</span>
            <h3 id="modal-title" class="modal-title"></h3>
            
            <div class="modal-body">
                <p id="modal-text" class="modal-text"></p>
            </div>

            <button class="copy-button" id="copy-from-modal-button">
                <i class="fas fa-copy"></i> Salin Prompt
            </button>
        </div>
    </div>
    
    <div id="image-modal" class="image-modal-overlay" onclick="closeModal(event, 'image-modal')">
        <div class="image-modal-content">
            <span class="image-modal-close" onclick="closeModal(null, 'image-modal')">&times;</span>
            <h4 id="image-modal-title" class="image-modal-title"></h4>
            <img id="image-modal-image" src="" alt="Gambar Tampilan" class="image-modal-image">
        </div>
    </div>

    <script>
        // Array berisi data prompt
        const prompts = [
            {
                id: 'prompt1',
                title: 'Action Figure',
                imageBefore: 'Data/Card1/Before.png',
                imageAfter: 'Data/Card1/After.png',
                text: `Buat figurin diri sendiri skala 1/8, dipajang di atas alas akrilik transparan.
                
Monitor menampilkan proses sculpting 3D, dengan kotak kemasan bergaya Hot Toys di sampingnya.`
            },
            {
                id: 'prompt2',
                title: 'Repair Foto',
                imageBefore: 'Data/Card2/Before.png',
                imageAfter: 'Data/Card2/After.png',
                text: `Edit foto ini menjadi sebuah potret studio berkualitas sangat tinggi, setara dengan hasil jepretan kamera profesional Canon EOS R5.

Fokus utama adalah menghasilkan gambar yang sangat tajam, jernih, bebas noise, dengan detail dan tekstur yang kaya pada kulit dan pakaian. Pastikan pencahayaan, warna, dan detail seimbang secara harmonis.

Untuk subjek:
* Komposisi: Pertahankan format setengah badan, dari area perut ke atas, dengan kedua lengan terlihat jelas.
* Wajah dan Pose: Sangat penting untuk mempertahankan bentuk wajah asli (mata, hidung, bibir, alis) serta pose dari foto sumber.
* Kulit dan rambut: perbarui kulit dengan warna yang sama namun tampak mulus sehat dan bercahaya seperti baru dirawat. rambut berkilau
* Pakaian: Perbarui kualitas pakaian agar terlihat lebih premium, namun pertahankan model, potongan, dan warna yang sama atau sangat serupa dengan aslinya.
* Pencahayaan: Ciptakan pencahayaan studio yang terang, lembut, dan merata dari arah depan (seperti beauty dish atau ring light). Pencahayaan ini harus menyoroti seluruh subjek tanpa menciptakan bayangan yang kasar atau gelap.
* Latar Belakang: Ganti latar belakang menjadi studio foto profesional dengan warna biru tua yang solid, bersih, dan elegan.`
            },
            {
                id: 'prompt3',
                title: 'Foto Di Madinah',
                imageBefore: 'Data/Card3/before.png',
                imageAfter: 'Data/Card3/after.png',
                text: `realistis resolusi 1080p dengan gaya foto alami (gunakan gambar saya yang disediakan dengan tepat dan ubah pakaiannya mengunakan baju gamis warna putih), memakai syal, dan menyikut tas ransel warnah abu-abu strip hijau
tambahkan jam tangan di kiri dan tangan kanan memegang botol air mineral. yang menampilkan ekspresi tersenyum. 
Latar belakang Spot foto viral yang sedang populer di Madinah. pada saat malam. 
Sudut kamera dari bawah. Pastikan hasilnya menyatu secara realistis, pertahankan wajah, dan pencahayaan dan bayangan konsisten.
Gambar harus ultra-realistis, sangat detail, 4K HD mentah, fotorealistik, pencahayaan sinematik, rentang dinamis tinggi, dan tekstur yang nyata seperti aslinya.`
            },
	      {
                id: 'Foto Wedding',
                title: 'Foto Wedding',
                imageBefore: 'Data/Card4/before.png',
                imageAfter: 'Data/Card4/after.png',
                text: `buatkan Sebuah bidikan jarak jauh yang elegan menangkap pasangan yang berbahagia di luar ruangan (gunakan kedua gambar yang di sediakan dengan tepat dengan akurat) pertahankan wajah dan rambutnya secara akurat. 
dengan wanita di latar depan dan pria di belakangnya. Wanita itu, yang menoleh dengan senyum cerah, mengenakan gaun putih lengan panjang yang berkibar dan jilbab putih yang senada. 
Gaunnya memiliki lipatan-lipatan halus dan menjuntai ke tanah, mengembang seolah-olah ia sedang berputar. Di latar belakang, 
pria itu berjalan dengan langkah mantap, tatapannya tertuju pada wanita itu. 
Ia mengenakan setelan hitam yang rapi dengan kemeja putih, dan jam tangan bergaya. Latarnya adalah lingkungan alam yang rimbun.
Keduanya berdiri di tepi sungai yang hijau dan berumput di samping perairan tenang yang memantulkan langit dan pepohonan di sekitarnya.
Latar belakangnya menampilkan deretan pepohonan yang rapat di tepi seberang, membentang di seluruh bingkai.
Pencahayaannya lembut dan alami, menunjukkan suasana pagi atau sore hari, dengan langit mendung yang lembut.
uasana keseluruhannya romantis dan tenteram, menekankan hubungan antara pasangan tersebut.`
            },
			
			
        ];

        let currentPromptId = '';
        const copyButton = document.getElementById('copy-from-modal-button');
        
        // Event listener untuk tombol salin
        copyButton.addEventListener('click', () => {
            copyPromptFromModal(currentPromptId);
        });

        // Event listener saat DOM selesai dimuat
        document.addEventListener('DOMContentLoaded', () => {
            createGalleryCards();
        });

        // Fungsi untuk membuat kartu galeri
        function createGalleryCards() {
            const galleryContainer = document.getElementById('gallery-container');
            
            prompts.forEach(prompt => {
                const card = document.createElement('div');
                card.classList.add('main-card');
                
                card.innerHTML = `
                    <div class="card-header">
                        <h3 class="main-card-title">${prompt.title}</h3>
                    </div>
                    <div class="image-pair-wrapper">
                        <div class="image-sub-card" onclick="showImageModal('${prompt.imageBefore}', '${prompt.title} (Before)')">
                            <img src="${prompt.imageBefore}" alt="Sebelum ${prompt.title}">
                            <div class="label before">
                                <span>Before</span>
                            </div>
                        </div>
                        <div class="image-sub-card" onclick="showImageModal('${prompt.imageAfter}', '${prompt.title} (After)')">
                            <img src="${prompt.imageAfter}" alt="Sesudah ${prompt.title}">
                            <div class="after-and-prompt-buttons">
                                <div class="label after">
                                    <span>After</span>
                                </div>
                                <button class="prompt-button" onclick="event.stopPropagation(); showPromptModal('${prompt.id}')">
                                    <i class="fas fa-magic"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                
                galleryContainer.appendChild(card);
            });
        }
        
        // Fungsi untuk menampilkan modal prompt
        function showPromptModal(id) {
            const modal = document.getElementById('prompt-modal');
            const modalTitle = document.getElementById('modal-title');
            const modalText = document.getElementById('modal-text');

            const currentData = prompts.find(p => p.id === id);

            if (currentData) {
                modalTitle.textContent = currentData.title;
                modalText.innerHTML = currentData.text.replace(/\n/g, '<br>');
                modal.classList.add('active');
                currentPromptId = id;
            }
        }
        
        // Fungsi untuk menampilkan modal gambar
        function showImageModal(imageUrl, title) {
            const modal = document.getElementById('image-modal');
            const modalImage = document.getElementById('image-modal-image');
            const modalTitle = document.getElementById('image-modal-title');
            
            modalImage.src = imageUrl;
            modalTitle.textContent = title;
            modal.classList.add('active');
        }

        // Fungsi untuk menutup modal
        function closeModal(event, modalId) {
            const modal = document.getElementById(modalId);
            if (event && (event.target.closest('.modal-content') || event.target.closest('.image-modal-content'))) {
                 return;
            }
            modal.classList.remove('active');
        }

        // Fungsi untuk menyalin teks prompt ke clipboard
        function copyPromptFromModal(id) {
            const dataToCopy = prompts.find(p => p.id === id);

            if (!dataToCopy) {
                console.error('Data prompt tidak ditemukan untuk ID:', id);
                return;
            }

            const promptText = dataToCopy.text.trim();

            navigator.clipboard.writeText(promptText)
                .then(() => {
                    copyButton.textContent = "Berhasil Disalin!";
                    copyButton.classList.add('copied');
                    
                    setTimeout(() => {
                        copyButton.innerHTML = `<i class="fas fa-copy"></i> Salin Prompt`;
                        copyButton.classList.remove('copied');
                    }, 2000);
                })
                .catch(err => {
                    console.error('Gagal menyalin prompt:', err);
                    alert('Gagal menyalin prompt. Silakan salin secara manual: \n' + promptText);
                });
        }
    </script>
</body>
</html>
